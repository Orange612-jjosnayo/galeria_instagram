name: Deploy con Docker a VPS

on:
  push:
    branches:
      - main

# Permisos necesarios para escribir/leer en el registro de paquetes de GitHub (GHCR)
permissions:
  packages: write
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Iniciar sesión en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Genera etiquetas automáticas en minúsculas para el registro
      - name: Extraer metadatos para Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest

      - name: Construir y subir imagen de Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push # Espera a que la imagen se suba con éxito
    steps:
      - name: Desplegar en el VPS vía SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }} # Apunta a 'deployer'
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # 1. Transformar el nombre de la imagen a minúsculas usando Bash en el VPS
            RAW_IMAGE_NAME="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
            IMAGE_NAME_LOWER=$(echo "$RAW_IMAGE_NAME" | tr '[:upper:]' '[:lower:]')

            # 2. Autenticar Docker en el VPS con GitHub Registry
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

            # 3. Descargar la última versión de la imagen (usando la variable corregida)
            docker pull $IMAGE_NAME_LOWER:latest

            # 4. Detener y eliminar el contenedor anterior si ya existía
            docker stop ${{ github.event.repository.name }} || true
            docker rm ${{ github.event.repository.name }} || true

            # 5. Encender el nuevo contenedor conectado a nginx-proxy
            docker run -d \
              --name ${{ github.event.repository.name }} \
              --restart unless-stopped \
              --network proxy-network \
              -e VIRTUAL_HOST=staging.${{ github.event.repository.name }}.${{ secrets.VPS_HOST }}.nip.io \
              $IMAGE_NAME_LOWER:latest

            # 6. Limpieza de imágenes antiguas para optimizar espacio en disco
            docker image prune -f
