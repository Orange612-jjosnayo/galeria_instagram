name: Deploy con Docker a VPS (React)

on:
  push:
    branches:
      - main

# Permisos para escribir/leer en el registro de paquetes de GitHub (GHCR)
permissions:
  packages: write
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Iniciar sesión en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Genera la etiqueta 'latest' para la imagen de Docker
      - name: Extraer metadatos para Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest

      - name: Construir y subir imagen de Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push # Espera a que la imagen se construya con éxito
    steps:
      - name: Desplegar en el VPS vía SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }} # Aquí se usará 'deployer'
          key: ${{ secrets.VPS_SSH_KEY }}       # La llave privada que copiaste de 'deployer'
          script: |
            # 1. Iniciar sesión en el registro desde el VPS
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

            # 2. Descargar la versión más reciente de la imagen
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

            # 3. Detener y eliminar el contenedor viejo si existe
            docker stop ${{ github.event.repository.name }} || true
            docker rm ${{ github.event.repository.name }} || true

            # 4. Iniciar el nuevo contenedor de React en el puerto 8081
            docker run -d \
              --name ${{ github.event.repository.name }} \
              -p 8081:80 \
              --restart unless-stopped \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
